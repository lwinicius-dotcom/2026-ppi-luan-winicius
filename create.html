{% extends 'base.html' %}
{% block title %}Novo Objeto{% endblock %}
{% block header %}<h1>Adicionar à Coleção</h1>{% endblock %}
{% block content %}
  <form method="post">
    <label for="nome">Nome do Objeto</label>
    <input name="nome" id="nome" required>
    
    <label for="categoria">Categoria</label>
    <input name="categoria" id="categoria" placeholder="Ex: Livros, Moedas, Jogos" required>
    
    <label for="quantidade">Quantidade</label>
    <input type="number" name="quantidade" id="quantidade" value="1" min="1" required>
    
    <label for="descricao">Descrição / Detalhes</label>
    <textarea name="descricao" id="descricao"></textarea>
    
    <input type="submit" value="Salvar na Coleção">
  </form>
{% endblock %}
