<!doctype html>
<title>{% block title %}{% endblock %} - Minha Coleção</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<nav>
  <h1><a href="{{ url_for('index') }}">📦 Gerenciador de Coleções</a></h1>
  <ul>
    {% if g.user %}
      <li><span>Olá, <strong>{{ g.user['username'] }}</strong></span></li>
      <li><a href="{{ url_for('auth.logout') }}">Sair</a></li>
    {% else %}
      <li><a href="{{ url_for('auth.register') }}">Registrar</a></li>
      <li><a href="{{ url_for('auth.login') }}">Entrar</a></li>
    {% endif %}
  </ul>
</nav>
<section class="content">
  <header>
    {% block header %}{% endblock %}
  </header>
  {% for message in get_flashed_messages() %}
    <div class="flash" style="background: #ffdddd; color: #aabbcc; padding: 0.5rem; margin-bottom: 1rem; border-radius: 3px;">
      {{ message }}
    </div>
  {% endfor %}
  {% block content %}{% endblock %}
</section>
