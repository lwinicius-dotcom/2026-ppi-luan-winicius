{% extends 'base.html' %}

{% block title %}Registrar{% endblock %}

{% block header %}
  <h1>Criar Nova Conta</h1>
{% endblock %}

{% block content %}
  <form method="post">
    <label for="username">Nome de Usuário</label>
    <input name="username" id="username" placeholder="Escolha seu usuário" required>
    
    <label for="password">Senha</label>
    <input type="password" name="password" id="password" placeholder="Crie uma senha" required>
    
    <input type="submit" value="Registrar Conta">
  </form>
{% endblock %}
